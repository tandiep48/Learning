<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Lessons</title>
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="/static/recommend/recommend.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="recommend-container">
        <a href="/" class="page-back">← Back to Dashboard</a>

        <div class="page-header">
            <h1 class="page-title">
                <i class="fa-solid fa-compass" aria-hidden="true"></i>
                <span>Recommended Lessons</span>
            </h1>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label class="filter-label" for="filter-level">Level</label>
                <div class="select-wrapper">
                    <select id="filter-level" class="filter-select">
                        <option value="all">All Levels</option>
                        <option value="1">HSK 1</option>
                        <option value="2">HSK 2</option>
                        <option value="3">HSK 3</option>
                        <option value="4">HSK 4</option>
                        <option value="5">HSK 5</option>
                        <option value="6">HSK 6</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-skill">Skill</label>
                <div class="select-wrapper">
                    <select id="filter-skill" class="filter-select">
                        <option value="all">All Skills</option>
                        <option value="listening">Listening</option>
                        <option value="reading">Reading</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-category">Category</label>
                <div class="select-wrapper">
                    <select id="filter-category" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="practice">Practice</option>
                        <option value="exam">Exam</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-status">Status</label>
                <div class="select-wrapper">
                    <select id="filter-status" class="filter-select">
                        <option value="all">All Statuses</option>
                        <option value="Not start">Not start</option>
                        <option value="Finish and success">Finish and success</option>
                        <option value="Finish and fail">Finish and fail</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>
        </div>

        <!-- Dynamic content injected by recommend.js -->
        <div id="rec-container">
            <div class="state-box">
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="state-title" style="margin-top:16px;">Finding recommendations…</div>
                <div class="state-sub">Analysing your vocabulary progress.</div>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination-bar" class="pagination-bar" style="display:none;"></div>
    </div>

    <!-- Sticky Multi-select Bar -->
    <div id="multi-select-bar" class="multi-select-bar hidden">
        <span id="multi-select-count">0 items selected</span>
        <button id="btn-start-multi" class="btn-start-practice" onclick="startMultiRecommend()">
            <i class="fa-solid fa-play" aria-hidden="true"></i>
            <span>Start Selected</span>
        </button>
    </div>

    <script src="/static/recommend/recommend.js"></script>
</body>
</html>
