<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommended Lessons</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="/static/recommend/recommend.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="recommend-container">
        <a href="/" class="page-back">← Back to Dashboard</a>

        <div class="page-header">
            <h1 class="page-title">📡 Recommended Lessons</h1>
            <p class="page-subtitle">Practice lessons matched to the vocabulary you've already mastered.</p>
        </div>

        <div class="tabs-group">
            <div class="tabs-container">
                <span class="tab-label">Level:</span>
                <button class="tab-btn active" data-level="all">All</button>
                <button class="tab-btn" data-level="1">HSK 1</button>
                <button class="tab-btn" data-level="2">HSK 2</button>
                <button class="tab-btn" data-level="3">HSK 3</button>
                <button class="tab-btn" data-level="4">HSK 4</button>
                <button class="tab-btn" data-level="5">HSK 5</button>
                <button class="tab-btn" data-level="6">HSK 6</button>
            </div>
            
            <div class="tabs-container">
                <span class="tab-label">Skill:</span>
                <button class="tab-btn skill-btn active" data-skill="all">All</button>
                <button class="tab-btn skill-btn" data-skill="listening">Listening</button>
                <button class="tab-btn skill-btn" data-skill="reading">Reading</button>
            </div>

            <div class="tabs-container">
                <span class="tab-label">Category:</span>
                <button class="tab-btn category-btn active" data-category="all">All</button>
                <button class="tab-btn category-btn" data-category="practice">📋 Practice</button>
                <button class="tab-btn category-btn" data-category="exam">📝 Exam</button>
            </div>

            <div class="tabs-container">
                <span class="tab-label">Status:</span>
                <button class="tab-btn status-btn active" data-status="all">All</button>
                <button class="tab-btn status-btn" data-status="Not start">Not start</button>
                <button class="tab-btn status-btn" data-status="Finish and success">Finish and success</button>
                <button class="tab-btn status-btn" data-status="Finish and fail">Finish and fail</button>
            </div>
        </div>

        <!-- Dynamic content injected by recommend.js -->
        <div id="rec-container">
            <div class="state-box">
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="state-title" style="margin-top:16px;">Finding recommendations…</div>
                <div class="state-sub">Analysing your vocabulary progress.</div>
            </div>
        </div>
    </div>

    <!-- Sticky Multi-select Bar -->
    <div id="multi-select-bar" class="multi-select-bar hidden">
        <span id="multi-select-count">0 items selected</span>
        <button id="btn-start-multi" class="btn-start-practice" onclick="startMultiRecommend()">
            ▶ Start Selected
        </button>
    </div>

    <script src="/static/recommend/recommend.js"></script>
</body>
</html>
