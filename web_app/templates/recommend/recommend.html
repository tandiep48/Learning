<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('recommend.page_title') }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/recommend/recommend.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="recommend-container">
        <a href="/" class="page-back">← {{ t('picker.back_to_dashboard') }}</a>

        <div class="page-header">
            <h1 class="page-title">
                <i class="fa-solid fa-compass" aria-hidden="true"></i>
                <span>{{ t('recommend.page_title') }}</span>
            </h1>
        </div>

        <div class="filters-bar">
            <div class="filter-group">
                <label class="filter-label" for="filter-level">{{ t('recommend.level') }}</label>
                <div class="select-wrapper">
                    <select id="filter-level" class="filter-select">
                        <option value="all">{{ t('recommend.all_levels') }}</option>
                        <option value="1">HSK 1</option>
                        <option value="2">HSK 2</option>
                        <option value="3">HSK 3</option>
                        <option value="4">HSK 4</option>
                        <option value="5">HSK 5</option>
                        <option value="6">HSK 6</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-skill">{{ t('recommend.skill') }}</label>
                <div class="select-wrapper">
                    <select id="filter-skill" class="filter-select">
                        <option value="all">{{ t('recommend.all_skills') }}</option>
                        <option value="listening">{{ t('recommend.listening') }}</option>
                        <option value="reading">{{ t('recommend.reading') }}</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-category">{{ t('recommend.category') }}</label>
                <div class="select-wrapper">
                    <select id="filter-category" class="filter-select">
                        <option value="all">{{ t('recommend.all_categories') }}</option>
                        <option value="practice">{{ t('dashboard.exercise') }}</option>
                        <option value="exam">{{ t('dashboard.exam') }}</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>

            <div class="filter-group">
                <label class="filter-label" for="filter-status">{{ t('recommend.status') }}</label>
                <div class="select-wrapper">
                    <select id="filter-status" class="filter-select">
                        <option value="all">{{ t('recommend.all_statuses') }}</option>
                        <option value="Not start" selected>{{ t('recommend.status_not_start') }}</option>
                        <option value="Finish and success">{{ t('recommend.status_finish_success') }}</option>
                        <option value="Finish and fail">{{ t('recommend.status_finish_fail') }}</option>
                    </select>
                    <i class="fa-solid fa-chevron-down select-icon" aria-hidden="true"></i>
                </div>
            </div>
        </div>

        <!-- Dynamic content injected by recommend.js -->
        <div id="rec-container">
            <div class="state-box">
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <div class="state-title" style="margin-top:16px;">{{ t('recommend.finding') }}</div>
                <div class="state-sub">{{ t('recommend.analysing') }}</div>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination-bar" class="pagination-bar" style="display:none;"></div>
    </div>

    <!-- Sticky Multi-select Bar -->
    <div id="multi-select-bar" class="multi-select-bar hidden">
        <span id="multi-select-count">{{ t('recommend.items_selected', count=0) }}</span>
        <button id="btn-start-multi" class="btn-start-practice" onclick="startMultiRecommend()">
            <i class="fa-solid fa-play" aria-hidden="true"></i>
            <span>{{ t('recommend.start_selected') }}</span>
        </button>
    </div>

    <script src="/static/recommend/recommend.js?v=3"></script>
</body>
</html>
