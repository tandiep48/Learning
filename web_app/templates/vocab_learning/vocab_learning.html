<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Learning – {{ hsk_level }}</title>
    <!-- removed script for hskLevel -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="/static/vocab_learning/vocab_learning.css">
    <link rel="stylesheet" href="/static/shared/vocab_table.css">
    <link rel="stylesheet" href="/static/shared/passage_picker.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body>
<div class="vl-container">

    {% include 'shared/passage_picker.html' %}

    <!-- ── SCREEN: Loading ── -->
    <div id="screen-loading" style="display:none;">
        <div class="vl-loading">
            <div class="loader"></div>
            <p>Loading words…</p>
        </div>
    </div>

    <!-- ── SCREEN: Learning Card ── -->
    <div id="screen-learning" style="display:none;">

        <!-- Top bar -->
        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
            <button class="vl-back" style="background:none; border:none; cursor:pointer; padding:0;" onclick="backToLessons()">
                ← Back to Lessons
            </button>
            <span id="vl-counter" class="vl-counter" style="margin:0;"></span>
        </div>

        <!-- Progress bar -->
        <div class="vl-progress-bar">
            <div id="vl-progress-fill" class="vl-progress-fill" style="width:0%"></div>
        </div>

        <!-- Word Card -->
        <div class="vl-card" id="vl-card">
            <div id="vl-hanzi" class="vl-hanzi">—</div>
            <div id="vl-pinyin" class="vl-pinyin"></div>
            <div id="vl-meaning" class="vl-meaning"></div>

            <div class="vl-typing-container" style="margin: 15px 0;">
                <input type="text" id="vl-typing-input" placeholder="Type character here..." autocomplete="off" class="vl-input">
            </div>


            <button id="btn-audio" class="vl-audio-btn" onclick="playAudio()">
                🔊 Play Audio
            </button>
            <button id="btn-stroke" class="vl-stroke-btn" onclick="openStrokeModal()">
                ✏️ Stroke Order
            </button>
            <audio id="vl-audio"></audio>
        </div>

        <!-- Navigation -->
        <div class="vl-nav-row" style="margin-top:20px;">
            <button id="btn-prev" class="vl-nav-btn" onclick="prevWord()" title="Previous (←)">← Prev</button>

            <button class="vl-train-btn" onclick="showVocabSummary()">
                Summary
            </button>

            <button id="btn-next" class="vl-nav-btn" onclick="nextWord()" title="Next (→)">Next →</button>
        </div>

        <p style="text-align:center; color:var(--text-muted); font-size:0.78rem; margin-top:14px;">
            Tip: Use ← → arrow keys to navigate · Space to replay audio
        </p>

    </div>

    <!-- ── SCREEN: Summary ── -->
    <div id="screen-summary" style="display:none; margin-top:20px;">
        <div class="vl-summary-header">
            <button class="vl-back" style="background:none; border:none; cursor:pointer; padding:0;" onclick="backToLessons()">
                ← Back to Lessons
            </button>
            <h2 style="color:var(--text-main); margin:0;">Lesson Summary</h2>
            <div class="vl-summary-actions">
                <button class="vl-train-btn" onclick="goToTrainer()">Train This Vocab</button>
            </div>
        </div>
        <div id="vl-summary-body" style="background: #1a1b26; border-radius: 12px; padding: 20px;">
            <!-- Table injected via JS -->
        </div>
    </div>

</div>

<script src="/static/shared/passage_picker.js"></script>
<script src="/static/vocab_learning/vocab_learning.js"></script>

<!-- ── Stroke Order Modal ── -->
<div id="stroke-modal-overlay" class="stroke-modal-overlay" onclick="closeStrokeModalIfBackground(event)">
    <div class="stroke-modal">
        <div class="stroke-modal-header">
            <div>
                <div id="stroke-modal-word" class="stroke-modal-word"></div>
                <div id="stroke-modal-pinyin" class="stroke-modal-pinyin"></div>
            </div>
            <button class="stroke-modal-close" onclick="closeStrokeModal()">✕</button>
        </div>

        <!-- Character tabs (for multi-char words) -->
        <div id="stroke-char-tabs" class="stroke-char-tabs"></div>

        <!-- Canvas area -->
        <div class="stroke-canvas-wrap">
            <div id="stroke-canvas-container"></div>
        </div>

        <!-- Controls -->
        <div class="stroke-controls">
            <button class="stroke-btn" onclick="strokeAnimate()">▶ Animate</button>
            <button class="stroke-btn" onclick="strokeQuiz()" id="btn-stroke-quiz">✏️ Practice</button>
            <button class="stroke-btn secondary" onclick="strokeReset()">↺ Reset</button>
        </div>
        <p class="stroke-hint">Click on a character tab above to switch · Animate shows stroke order step by step</p>
    </div>
</div>
</body>
</html>
