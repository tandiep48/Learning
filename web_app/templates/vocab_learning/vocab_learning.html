<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('vocab_learning.page_title', hsk_level=hsk_level) }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/shared/vocab_table.css?v=11">
    <link rel="stylesheet" href="/static/shared/passage_picker.css?v=7">
    <link rel="stylesheet" href="/static/vocab_learning/vocab_learning.css?v=11">
    <link rel="stylesheet" href="/static/shared/sidebar.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    {% include 'shared/sidebar.html' %}
    <div class="app-container">
        {% include 'shared/passage_picker.html' %}

        <div id="screen-loading" style="display:none;">
            <div class="vl-loading">
                <div class="loader"></div>
                <p>{{ t('vocab_learning.loading_words') }}</p>
            </div>
        </div>

        <div id="screen-learning" style="display:none;">
            <div class="vl-learning-topbar">
                <span id="vl-counter" class="vl-counter"></span>
            </div>

            <div class="vl-progress-bar vl-card-progress">
                <div id="vl-progress-fill" class="vl-progress-fill" style="width:0%"></div>
            </div>

            <div class="vl-card" id="vl-card">
                <div id="vl-hanzi" class="vl-hanzi">-</div>
                <div id="vl-pinyin" class="vl-pinyin"></div>
                <div id="vl-meaning" class="vl-meaning"></div>

                <div class="vl-typing-container">
                    <input type="text" id="vl-typing-input" lang="zh-CN" placeholder="{{ t('vocab_learning.typing_placeholder') }}"
                        autocomplete="off" class="vl-input">
                </div>

                <div class="vl-card-controls">
                    <button id="btn-audio" class="vl-audio-btn" onclick="playAudio()">
                        <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
                        <span>{{ t('reading.play_audio') }}</span>
                    </button>
                    <button id="btn-speak" class="vl-speak-btn" onclick="toggleSpeakingPractice()">
                        <i class="fa-solid fa-microphone" aria-hidden="true"></i>
                        <span>{{ t('vocab_trainer.speak') }}</span>
                    </button>
                    <button id="btn-stroke" class="vl-stroke-btn" onclick="openStrokeModal()">
                        <i class="fa-solid fa-pen-nib" aria-hidden="true"></i>
                        <span>{{ t('vocab_learning.stroke_order') }}</span>
                    </button>
                </div>

                <div id="vl-speaking-panel" class="vl-speaking-panel" style="display:none;">
                    <div id="vl-speaking-status" class="vl-speaking-status">{{ t('vocab_learning.speaking_status') }}</div>
                    <div id="vl-speaking-result" class="vl-speaking-result" style="display:none;"></div>
                </div>
                <audio id="vl-audio"></audio>
            </div>

            <div class="vl-nav-row">
                <button id="btn-prev" class="vl-nav-btn" onclick="prevWord()" title="Previous">&larr; {{ t('reading.prev') }}</button>
                <button class="vl-train-btn" onclick="showVocabSummary()">
                    <i class="fa-solid fa-table-list" aria-hidden="true"></i>
                    <span>{{ t('reading.summary') }}</span>
                </button>
                <button class="vl-train-btn" onclick="shuffleLearningWords()" title="{{ t('vocab_learning.shuffle_words_title') }}">
                    <i class="fa-solid fa-shuffle" aria-hidden="true"></i>
                    <span>{{ t('vocab_learning.shuffle') }}</span>
                </button>
                <button id="btn-next" class="vl-nav-btn" onclick="nextWord()" title="Next">{{ t('reading.next') }} &rarr;</button>
            </div>

            <p class="vl-keyboard-tip">{{ t('vocab_learning.keyboard_tip') }}</p>
        </div>

        <div id="screen-summary" style="display:none;">
            <div class="vl-summary-topbar word-summary-topbar">
                <div>
                    <div id="vocab-breadcrumb"></div>
                </div>
            </div>

            <div class="vocab-content-card summary-content-card vocab-table-theme">
                <div id="vl-summary-body" class="vocab-table-wrap">
                    <!-- Table injected via JS -->
                </div>
            </div>

            <div class="vl-summary-footer">
                <button class="vl-train-btn vl-learn-btn" onclick="startLearningCards()">
                    <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
                    <span>{{ t('vocab_learning.learn_these_words') }}</span>
                </button>
                <button class="vl-train-btn" onclick="goToTrainer()">
                    <i class="fa-solid fa-dumbbell" aria-hidden="true"></i>
                    <span>{{ t('vocab_learning.train_these_vocab') }}</span>
                </button>
            </div>
        </div>
    </div><!-- /.page-main -->
</div><!-- /.page-layout -->

    <div id="stroke-modal-overlay" class="stroke-modal-overlay" onclick="closeStrokeModalIfBackground(event)">
        <div class="stroke-modal" role="dialog" aria-modal="true" aria-labelledby="stroke-modal-word">
            <div class="stroke-modal-header">
                <div>
                    <div id="stroke-modal-word" class="stroke-modal-word"></div>
                    <div id="stroke-modal-pinyin" class="stroke-modal-pinyin"></div>
                </div>
                <button class="stroke-modal-close" onclick="closeStrokeModal()" aria-label="{{ t('vocab_learning.close_stroke_order_aria') }}">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
            </div>

            <div id="stroke-char-tabs" class="stroke-char-tabs"></div>
            <div class="stroke-canvas-wrap">
                <div id="stroke-canvas-container"></div>
            </div>

            <div class="stroke-controls">
                <button class="stroke-btn" onclick="strokeAnimate()">
                    <i class="fa-solid fa-play" aria-hidden="true"></i>
                    <span>{{ t('widgets.animate') }}</span>
                </button>
                <button class="stroke-btn" onclick="strokeQuiz()">
                    <i class="fa-solid fa-pen" aria-hidden="true"></i>
                    <span>{{ t('widgets.practice') }}</span>
                </button>
                <button class="stroke-btn secondary" onclick="strokeReset()">
                    <i class="fa-solid fa-rotate-left" aria-hidden="true"></i>
                    <span>{{ t('widgets.reset') }}</span>
                </button>
            </div>
            <p class="stroke-hint">{{ t('vocab_learning.stroke_hint_words') }}</p>
        </div>
    </div>

    <script src="/static/shared/passage_picker.js?v=11"></script>
    <script src="/static/shared/passage_label.js"></script>
    <script src="/static/vocab_learning/vocab_learning.js?v=11"></script>
    <script src="/static/shared/sidebar.js?v=7"></script>
</body>
</html>
