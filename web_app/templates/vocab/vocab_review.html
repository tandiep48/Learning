<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('vocab_review.page_title') }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/vocab/vocab_review.css?v=2">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="app-container">
        <div class="vocab-top-link">
            <a href="/">&larr; {{ t('picker.back_to_dashboard') }}</a>
        </div>

        <div class="review-content-card">
            <div class="review-header">
                <div>
                    <h1 class="review-heading">{{ t('vocab_review.heading') }}</h1>
                    <p class="review-subtitle">{{ t('vocab_review.subtitle') }}</p>
                </div>
                <button id="review-start-btn" class="btn primary review-start-btn" onclick="startReviewTraining()" disabled>
                    {{ t('vocab_review.start_training', count=0) }}
                </button>
            </div>

            <div id="review-state" class="review-state">{{ t('vocab_review.loading') }}</div>

            <div id="review-sections" class="review-sections" style="display:none;">
                <section class="review-section">
                    <div class="review-section-head">
                        <label class="review-select-all">
                            <input type="checkbox" id="review-select-all-cb">
                            <span>{{ t('vocab_review.select_all') }}</span>
                        </label>
                        <h2 class="review-section-title">
                            {{ t('vocab_review.list_title') }}
                            <span class="review-section-count" id="review-count">0</span>
                        </h2>
                    </div>
                    <div class="review-list" id="review-list"></div>
                    <div class="review-empty" id="review-empty" style="display:none;">{{ t('vocab_review.empty') }}</div>
                    <button class="btn secondary review-load-more" id="review-load-more" style="display:none;">{{ t('vocab_review.load_more') }}</button>
                </section>
            </div>
        </div>
    </div>

    <script src="/static/vocab/vocab_review.js?v=2"></script>
</body>
</html>
