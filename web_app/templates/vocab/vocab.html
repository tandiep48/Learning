<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Selection</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/shared/vocab_table.css?v=9">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/vocab/vocab_select.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
</head>
<body class="with-site-nav vocab-select-page">
    {% include 'shared/site_nav.html' %}
    <div class="app-container">
        <div id="screen-menu" class="screen active">
            <div class="vocab-top-link">
                <a href="/">&larr; Back to Dashboard</a>
            </div>

            <div class="vocab-content-card">
                <div class="vocab-table-header">
                    <div class="vocab-mode-select-wrap">
                        <label for="mode-select" class="vocab-mode-label">Mode</label>
                        <select id="mode-select" class="vocab-mode-select" onchange="setTableMode(this.value)">
                            <option value="free">Free</option>
                            <option value="standard" selected>Standard</option>
                            <option value="unsure">Unsure</option>
                            <option value="unlearn">Unlearn</option>
                            <option value="recent">Recent Learned</option>
                        </select>
                    </div>
                    <div class="vocab-action-buttons">
                        <button class="btn action-outline" onclick="clearSelection()">Clear Selection</button>
                        <button id="btn-flashcards" class="btn action-secondary" onclick="openSelectedFlashcards()" disabled>Flash Cards</button>
                        <button id="btn-start-selected" class="btn action-primary" onclick="startSelectedTraining()" disabled>Start Training</button>
                    </div>
                </div>

                <div class="vocab-search-row">
                    <div class="vocab-search-wrap">
                        <i class="fa-regular fa-magnifying-glass vocab-search-icon" aria-hidden="true"></i>
                        <input
                            type="text"
                            id="vocab-search-input"
                            class="vocab-search-input"
                            placeholder="Search by character, pinyin or meaning…"
                            oninput="handleSearchInput()"
                            autocomplete="off"
                            spellcheck="false"
                        >
                        <button class="vocab-search-clear" id="vocab-search-clear" onclick="clearSearch()" style="display:none;" aria-label="Clear search">&#x2715;</button>
                    </div>
                </div>

                <div class="vocab-filter-bar">
                    <div class="form-group hsk-filter">
                        <label for="filter-hsk">HSK</label>
                        <select id="filter-hsk" onchange="handleHskChange()">
                            <option value="">Select HSK</option>
                            <option value="HSK1">HSK 1</option>
                            <option value="HSK2">HSK 2</option>
                            <option value="HSK3">HSK 3</option>
                            <option value="HSK4">HSK 4</option>
                            <option value="HSK5">HSK 5</option>
                            <option value="HSK6">HSK 6</option>
                        </select>
                    </div>
                    <div class="form-group standard-filter">
                        <label for="filter-lesson">Lesson</label>
                        <select id="filter-lesson" onchange="handleLessonChange()" disabled>
                            <option value="">Select lesson</option>
                        </select>
                    </div>
                    <div class="form-group standard-filter">
                        <label for="filter-part">Part</label>
                        <select id="filter-part" onchange="handlePartChange()" disabled>
                            <option value="">Select part</option>
                        </select>
                    </div>
                    <div class="form-group page-size-filter">
                        <label for="filter-page-size">Rows</label>
                        <select id="filter-page-size" onchange="changePageSize()">
                            <option value="10">10</option>
                            <option value="20" selected>20</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                </div>

                <div id="vocab-table-state" class="vocab-table-state">Choose filters to load vocabulary.</div>
                <div id="vocab-table-wrap" class="vocab-table-wrap" style="display:none;"></div>

                <div id="vocab-pagination" class="vocab-pagination" style="display:none;">
                    <button class="btn secondary" id="page-prev-btn" onclick="changePage(-1)">Prev</button>
                    <span id="page-status">Page 1 / 1</span>
                    <button class="btn secondary" id="page-next-btn" onclick="changePage(1)">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/vocab/vocab_select.js?v=2"></script>

    <!-- ── Vocab Table Stroke Order Modal ── -->
    <div id="vocab-stroke-modal-overlay" class="stroke-modal-overlay" onclick="closeVocabStrokeModalIfBackground(event)">
        <div class="stroke-modal">
            <div class="stroke-modal-header">
                <div>
                    <div id="vocab-stroke-modal-word" class="stroke-modal-word"></div>
                    <div id="vocab-stroke-modal-pinyin" class="stroke-modal-pinyin"></div>
                </div>
                <button class="stroke-modal-close" onclick="closeVocabStrokeModal()">&#x2715;</button>
            </div>
            <!-- Character tabs (for multi-char words) -->
            <div id="vocab-stroke-char-tabs" class="stroke-char-tabs"></div>
            <!-- Canvas area -->
            <div class="stroke-canvas-wrap">
                <div id="vocab-stroke-canvas-container"></div>
            </div>
            <!-- Controls -->
            <div class="stroke-controls">
                <button class="stroke-btn" onclick="vocabStrokeAnimate()">&#9654; Animate</button>
                <button class="stroke-btn" onclick="vocabStrokeQuiz()">&#9999; Practice</button>
                <button class="stroke-btn secondary" onclick="vocabStrokeReset()">&#8635; Reset</button>
            </div>
            <p class="stroke-hint">Click on a character tab above to switch &middot; Animate shows stroke order step by step</p>
        </div>
    </div>
</body>
</html>
