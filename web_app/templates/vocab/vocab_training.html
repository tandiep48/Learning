<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Training</title>
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/static/shared/success_popup.css">
    <link rel="stylesheet" href="/static/vocab/vocab_training.css?v=3">
</head>

<body>
    <div class="app-container">
        <div id="screen-loading" class="screen active">
            <div class="loader"></div>
            <p>Fetching words...</p>
        </div>

        <div id="screen-training" class="screen">
            <div class="trainer-topbar">
                <button class="btn secondary trainer-quit-btn" onclick="confirmQuit()">Quit Session</button>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="task-counter" id="task-counter">Task 1/10</div>

            <div class="task-card">
                <div id="task-instruction" class="instruction"></div>
                <div id="word-display" class="chinese-word" style="display:none;"></div>

                <div id="audio-controls" style="display:none;" class="audio-controls">
                    <button id="btn-current-audio" class="btn-audio" onclick="playCurrentAudio()"
                        aria-label="Play audio" title="Play audio">
                        <i class="fa-solid fa-play play-icon" aria-hidden="true"></i>
                    </button>
                    <audio id="audio-player"></audio>
                </div>

                <div id="mc-area" class="mc-grid" style="display:none;"></div>
                <div id="mc-feedback" class="task-feedback" style="display:none;"></div>

                <div id="typing-area" class="typing-container" style="display:none;">
                    <input type="text" id="typing-input" lang="zh-CN" placeholder="Type the word here..."
                        autocomplete="off">
                    <div id="typing-feedback" class="task-feedback" style="display:none;"></div>
                </div>

                <!-- Speaking task area -->
                <div id="speaking-area" style="display:none;">
                    <div id="speaking-prompt" class="speaking-prompt"></div>
                    <button id="btn-speak-task" class="btn-speak-task" onclick="toggleSpeakingTask()">
                        <i class="fa-solid fa-microphone" aria-hidden="true"></i>
                        <span id="speak-task-label">Speak</span>
                    </button>
                    <div id="speaking-task-status" class="speaking-task-status"></div>
                    <!-- Revealed after answer (right or wrong) -->
                    <div id="speaking-word-reveal" class="speaking-word-reveal" style="display:none;">
                        <div id="speaking-reveal-hanzi" class="speaking-reveal-hanzi"></div>
                        <div id="speaking-reveal-pinyin" class="speaking-reveal-pinyin"></div>
                    </div>
                </div>

                <div class="trainer-task-actions">
                    <button id="btn-skip-task" class="skip-float-btn" onclick="skipTask()">
                        Skip <i class="fa-solid fa-forward-step" aria-hidden="true"></i>
                    </button>
                    <button id="typing-submit-btn" class="btn primary" onclick="submitTyping()"
                        style="display:none;">Submit</button>
                </div>
            </div>
        </div>

        <div id="screen-complete" class="screen">
            <div class="training-complete-table-wrap">
                <table class="training-complete-table">
                    <thead>
                        <tr>
                            <th>Character</th>
                            <th>Pinyin</th>
                            <th>Meaning (VN)</th>
                        </tr>
                    </thead>
                    <tbody id="recap-table-body"></tbody>
                </table>
                <div id="perfect-area" class="training-empty-state">No missed words this round.</div>
            </div>

            <div class="nav-buttons training-complete-actions">
                <button class="btn primary" onclick="goHome()">Back to Vocabulary</button>
                <button class="btn primary" id="btn-retry" onclick="retryMissed()">Retry Missed</button>
                <button class="btn primary" id="btn-start-lesson" style="display:none;" onclick="startLearnLesson()">
                    <i class="fa-solid fa-book-open" aria-hidden="true"></i>
                    <span>Lesson Summary</span>
                </button>
            </div>
        </div>
    </div>

    <div id="quit-modal-overlay" class="quit-modal-overlay" onclick="closeQuitModalIfBackground(event)">
        <div class="quit-modal">
            <h3>Quit Session?</h3>
            <p>Your current progress won't be saved.<br>Are you sure you want to quit?</p>
            <div class="quit-modal-btns">
                <button class="btn secondary" onclick="closeQuitModal()">Cancel</button>
                <button class="btn danger" onclick="goHome()">Yes, Quit</button>
            </div>
        </div>
    </div>

    <script src="/static/shared/success_popup.js"></script>
    <script src="/static/vocab/vocab_training.js?v=3"></script>
</body>

</html>
