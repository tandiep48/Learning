<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Trainer</title>
    <!-- Google Fonts: Inter for UI, Noto Sans SC for Chinese -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- SCREEN: Main Menu -->
        <div id="screen-menu" class="screen active">
            <div style="margin-bottom: 20px;">
                <a href="/" style="color: var(--primary); text-decoration: none;">&larr; Back to Dashboard</a>
            </div>
            <h1>Vocabulary Trainer</h1>
            <p class="subtitle">Select a training mode to begin</p>
            <div class="menu-buttons">
                <button class="btn primary" onclick="showSetup('1')">
                    <span class="btn-title">Standard Mode</span>
                    <span class="btn-desc">Select HSK level and range</span>
                </button>
                <button class="btn" onclick="showSetup('2')">
                    <span class="btn-title">Unlearned Words</span>
                    <span class="btn-desc">Practice words not yet learned</span>
                </button>
                <button class="btn" onclick="showSetup('3')">
                    <span class="btn-title">Unsure Words</span>
                    <span class="btn-desc">Practice slow-response learned words</span>
                </button>
                <button class="btn warning" onclick="showSetup('4')">
                    <span class="btn-title">Hard Semantic</span>
                    <span class="btn-desc">Practice difficult semantic words</span>
                </button>
                <button class="btn danger" onclick="showSetup('5')">
                    <span class="btn-title">Hard Stroke</span>
                    <span class="btn-desc">Practice complex stroke words</span>
                </button>
            </div>
        </div>

        <!-- SCREEN: Setup Mode 1 (Standard) -->
        <div id="screen-setup-standard" class="screen">
            <h2>Standard Mode Setup</h2>
            <div class="form-group">
                <label>HSK Level (e.g. H1, H2):</label>
                <input type="text" id="input-hsk" value="H1">
            </div>
            <div class="form-group">
                <label>Start Index:</label>
                <input type="number" id="input-start-idx" value="0">
            </div>
            <div class="form-group">
                <label>End Index:</label>
                <input type="number" id="input-end-idx" value="10">
            </div>
            <div class="nav-buttons">
                <button class="btn secondary" onclick="goHome()">Back</button>
                <button class="btn primary" onclick="startSession('1')">Start Training</button>
            </div>
        </div>

        <!-- SCREEN: Setup Other Modes -->
        <div id="screen-setup-other" class="screen">
            <h2 id="other-setup-title">Setup Mode</h2>
            <p id="preview-count" style="text-align: center; color: var(--text-muted); margin-bottom: 10px;"></p>
            <div class="recap-area" style="margin-bottom: 20px;">
                <ul id="preview-list"></ul>
            </div>
            <div class="form-group">
                <label>Limit words (leave blank for all):</label>
                <input type="number" id="input-limit" placeholder="e.g. 20">
            </div>
            <div class="nav-buttons">
                <button class="btn secondary" onclick="goHome()">Back</button>
                <button id="btn-start-other" class="btn primary" onclick="startSession(currentMode)">Start Training</button>
            </div>
        </div>

        <!-- SCREEN: Loading -->
        <div id="screen-loading" class="screen">
            <div class="loader"></div>
            <p>Fetching words...</p>
        </div>

        <!-- SCREEN: Training -->
        <div id="screen-training" class="screen">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="task-counter" id="task-counter">Task 1/10</div>

            <div class="task-card">
                <div id="task-instruction" class="instruction"></div>
                
                <div id="word-display" class="chinese-word" style="display:none;"></div>
                
                <div id="audio-controls" style="display:none;" class="audio-controls">
                    <button class="btn-audio" onclick="playCurrentAudio()">🔊 Play Audio</button>
                    <audio id="audio-player"></audio>
                </div>

                <!-- Multiple Choice Area (for listen and meaning) -->
                <div id="mc-area" class="mc-grid" style="display:none;">
                    <!-- buttons injected via JS -->
                </div>
                <div id="mc-feedback" style="display:none; margin-top: 15px; text-align: center; font-size: 20px; padding: 10px; border-radius: 8px; background: rgba(0, 0, 0, 0.2); width: 100%; box-sizing: border-box;"></div>

                <!-- Typing Area -->
                <div id="typing-area" class="typing-container" style="display:none;">
                    <input type="text" id="typing-input" lang="zh-CN" placeholder="Type the word here..." autocomplete="off">
                    <div id="typing-feedback" style="display:none; margin-top: 10px; margin-bottom: 15px; text-align: center; font-size: 20px; padding: 10px; border-radius: 8px; background: rgba(0, 0, 0, 0.2); width: 100%; box-sizing: border-box;"></div>
                    <button id="typing-submit-btn" class="btn primary" onclick="submitTyping()">Submit</button>
                </div>

            </div>



            <div class="nav-buttons end-session">
                <button class="btn secondary" onclick="goHome()">Quit Session</button>
            </div>
        </div>

        <!-- SCREEN: Session Complete -->
        <div id="screen-complete" class="screen">
            <h1>🎉 Training Complete!</h1>
            <p>You have successfully finished this round.</p>
            <div id="recap-area" class="recap-area">
                <h3>Missed Words Recap</h3>
                <ul id="recap-list"></ul>
                <div class="nav-buttons">
                    <button class="btn secondary" onclick="goHome()">Back to Menu</button>
                    <button class="btn primary" id="btn-retry" onclick="retryMissed()">Retry Missed</button>
                </div>
            </div>
            <div id="perfect-area" class="nav-buttons">
                <button class="btn primary" onclick="goHome()">Back to Menu</button>
            </div>
        </div>

    </div>

    <script src="/static/vocab.js"></script>
</body>
</html>
