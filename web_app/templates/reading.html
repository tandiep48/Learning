<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Practice - {{ hsk_level }}</title>
    <script>
        window.hskLevel = "{{ hsk_level }}";
    </script>
    <!-- Google Fonts: Inter for UI, Noto Sans SC for Chinese -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .toolbar-right { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── Reading Lines ── */
        .reading-line {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .reading-text { flex: 1; }
        .hanzi-text {
            font-size: 28px;
            font-family: 'Noto Sans SC', sans-serif;
            color: var(--text-main);
            margin-bottom: 4px;
            line-height: 1.5;
        }
        .pinyin-text {
            font-size: 17px;
            color: var(--primary);
            margin-bottom: 4px;
            display: none;
        }
        .pinyin-text.show { display: block; }
        .meaning-text {
            font-size: 14px;
            color: var(--text-muted);
            display: none;
        }
        .meaning-text.show { display: block; }
        .audio-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px; height: 42px;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .audio-btn:hover { background: var(--primary); }

        /* ── Passage list grid ── */
        .passage-section { margin-bottom: 20px; }
        .passage-section h3 {
            margin-bottom: 10px;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .passage-list { max-height: 500px; overflow-y: auto; padding-right: 10px; }

        /* ── Vocab Panel (slide-in overlay) ── */
        .vocab-panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }
        .vocab-panel-overlay.open {
            display: flex;
            animation: fadeIn 0.2s ease;
        }
        .vocab-panel {
            background: #1a1b26; /* Solid background to prevent bleed-through */
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
        .vocab-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 22px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            flex-shrink: 0;
        }
        .vocab-panel-header h3 { margin: 0; font-size: 1.1rem; color: var(--text-main); }
        .vocab-close-btn {
            background: rgba(255,255,255,0.08);
            border: none;
            color: var(--text-muted);
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .vocab-close-btn:hover { background: rgba(255,255,255,0.15); color: var(--text-main); }
        .vocab-panel-body {
            overflow-y: auto;
            padding: 16px 22px 22px;
            flex: 1;
        }
        .vocab-loading { text-align: center; color: var(--text-muted); padding: 30px 0; }

        /* ── Vocab Table ── */
        .vocab-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.92rem;
        }
        .vocab-table thead th {
            text-align: left;
            padding: 10px 12px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .vocab-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }
        .vocab-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .vocab-table td { padding: 11px 12px; vertical-align: middle; }
        .vocab-cn {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .vocab-pinyin { color: var(--primary); font-size: 0.88rem; }
        .vocab-meaning { color: var(--text-muted); font-size: 0.88rem; }
        .vocab-level {
            display: inline-block;
            background: rgba(67,97,238,0.18);
            color: #818cf8;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.72rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
        }
        .vocab-audio-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .vocab-audio-btn:hover { background: rgba(67,97,238,0.15); }
        .vocab-empty { text-align: center; color: var(--text-muted); padding: 24px; }

        /* ── Finish bar ── */
        .finish-bar {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="app-container" style="max-width: 800px;">

        <!-- SCREEN: Main Menu -->
        <div id="screen-menu" class="screen active">
            <div style="margin-bottom: 20px;">
                <a href="/" style="color: var(--primary); text-decoration: none;">&larr; Back to Dashboard</a>
            </div>
            <h1>Reading Lesson</h1>
            <p class="subtitle">Select a passage to read</p>
            <div class="form-group" style="margin-bottom: 20px;">
                <input type="text" id="search-input" placeholder="Search passage ID..." onkeyup="filterPassages()">
            </div>
            <div id="passage-container" class="passage-list">
                <p>Loading passages...</p>
            </div>
        </div>

        <!-- SCREEN: Loading -->
        <div id="screen-loading" class="screen">
            <div class="loader"></div>
            <p>Loading passage...</p>
        </div>

        <!-- SCREEN: Reading -->
        <div id="screen-reading" class="screen">
            <div class="toolbar">
                <button class="btn secondary" onclick="goHome()">&larr; Back to Menu</button>
                <div class="toolbar-right">
                    <button class="btn" id="toggle-pinyin-btn" onclick="togglePinyin()">Show Pinyin</button>
                    <button class="btn" id="toggle-meaning-btn" onclick="toggleMeaning()">Show Meaning</button>
                    <button class="btn" id="show-vocab-btn" onclick="openVocabPanel()">📚 Vocab</button>
                </div>
            </div>

            <h2 id="reading-title" style="margin-bottom: 20px; color: var(--primary);">Passage Title</h2>

            <div id="reading-content" style="max-height: 60vh; overflow-y: auto; padding-right: 10px;">
                <!-- Content injected via JS -->
            </div>

            <div class="finish-bar">
                <button class="btn primary" style="flex:1;" onclick="startLessonPractice()">
                    🎯 Start Lesson Practice
                </button>
                <button class="btn secondary" style="flex:1;" onclick="goHome()">
                    Finished Reading
                </button>
            </div>
        </div>

    </div><!-- /app-container -->

    <!-- ── Vocab Slide Panel ── -->
    <div id="vocab-panel-overlay" class="vocab-panel-overlay" onclick="closeVocabIfBackground(event)">
        <div class="vocab-panel">
            <div class="vocab-panel-header">
                <h3 id="vocab-panel-title">Lesson Vocabulary</h3>
                <button class="vocab-close-btn" onclick="closeVocabPanel()">✕</button>
            </div>
            <div class="vocab-panel-body" id="vocab-panel-body">
                <div class="vocab-loading">Loading...</div>
            </div>
        </div>
    </div>

    <script src="/static/reading.js"></script>
</body>
</html>
