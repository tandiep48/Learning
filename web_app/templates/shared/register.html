<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('auth.register_page_title') }}</title>
    <link rel="stylesheet" href="/static/shared/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-lang-switch">
            <a href="{{ url_for('set_ui_language', lang='en') }}" class="{{ 'active' if current_lang == 'en' }}">EN</a>
            <a href="{{ url_for('set_ui_language', lang='vi') }}" class="{{ 'active' if current_lang == 'vi' }}">VI</a>
        </div>
        <h2>{{ t('auth.register_heading') }}</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-messages {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="username">{{ t('auth.username_label') }}</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">{{ t('auth.email_label') }}</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">{{ t('auth.password_label') }}</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-success">{{ t('auth.register_button') }}</button>
        </form>
        <div class="links">
            <p>{{ t('auth.have_account_prompt') }} <a href="{{ url_for('auth.login') }}">{{ t('auth.login_here') }}</a></p>
        </div>
    </div>
</body>
</html>
