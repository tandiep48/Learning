<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select HSK Level - {{ app_mode | title }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="/static/shared/level_select.css?v=3">
</head>
<body class="bg-gray-50">
    <div class="dashboard-container">
        <h1 class="dashboard-title">Select Level</h1>
        <p class="dashboard-subtitle">Choose an HSK level to start your {{ app_mode }} practice.</p>

        <div class="level-grid">
            <a href="/{{ app_mode }}/HSK1" class="level-card" style="background-color: #d9d9d8;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(1) }}" alt=""></div>
                <div class="level-name">HSK 1</div>
            </a>
            <a href="/{{ app_mode }}/HSK2" class="level-card" style="background-color: #d0f1d2;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(2) }}" alt=""></div>
                <div class="level-name">HSK 2</div>
            </a>
            <a href="/{{ app_mode }}/HSK3" class="level-card" style="background-color: #99d8e9;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(3) }}" alt=""></div>
                <div class="level-name">HSK 3</div>
            </a>
            <a href="/{{ app_mode }}/HSK4" class="level-card" style="background-color: #fce084;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(4) }}" alt=""></div>
                <div class="level-name">HSK 4</div>
            </a>
            <a href="/{{ app_mode }}/HSK5" class="level-card" style="background-color: #fcb86f;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(5) }}" alt=""></div>
                <div class="level-name">HSK 5</div>
            </a>
            <a href="/{{ app_mode }}/HSK6" class="level-card" style="background-color: #ee5550;">
                <div class="level-icon" aria-hidden="true"><img src="{{ hsk_image_url(6) }}" alt=""></div>
                <div class="level-name">HSK 6</div>
            </a>
        </div>

        <a href="/" class="nav-back">&larr; Back to Main Menu</a>
    </div>
</body>
</html>
