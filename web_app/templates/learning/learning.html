<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning</title>
    <link rel="stylesheet" href="/static/shared/styles.css">
    <link rel="stylesheet" href="/static/shared/passage_picker.css">
    <link rel="stylesheet" href="/static/learning/learning.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="app-container learning-container">
        <section id="learning-recent-panel" class="learning-recent-panel" style="display:none;">
            <div>
                <h2>Recent Lesson</h2>
                <p id="learning-recent-context" class="subtitle">Continue where you left off.</p>
            </div>
            <button class="btn primary learning-continue-btn" onclick="continueRecentLesson()">Continue</button>
        </section>

        {% include 'shared/passage_picker.html' %}

        <section id="learning-action-screen" class="learning-action-screen" style="display:none;">
            <div class="learning-topbar">
                <button class="btn secondary learning-back-btn" onclick="backToPartPicker()">Back to Parts</button>
                <a href="/" class="learning-home-link">Dashboard</a>
            </div>

            <div class="learning-heading">
                <h1>Learning</h1>
                <p id="learning-context" class="subtitle">Choose an activity.</p>
            </div>

            <div class="learning-guided-panel">
                <button class="btn primary learning-start-btn" onclick="startGuidedLessonPart()">
                    Start Lesson Part
                </button>
            </div>

            <div class="learning-part-nav" aria-label="Part navigation">
                <button id="btn-prev-part" class="btn secondary learning-part-nav-btn" onclick="goToAdjacentPart(-1)">Previous Part</button>
                <button id="btn-next-part" class="btn secondary learning-part-nav-btn" onclick="goToAdjacentPart(1)">Next Part</button>
            </div>
        </section>

    </div>

    <script src="/static/shared/passage_picker.js?v=2"></script>
    <script src="/static/learning/learning.js"></script>
</body>
</html>
