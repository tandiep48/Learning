<!DOCTYPE html>
<html lang="{{ current_lang }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('reading.page_title', hsk_level=hsk_level) }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/shared/passage_picker.css?v=8">
    <link rel="stylesheet" href="/static/shared/vocab_table.css?v=11">
    <link rel="stylesheet" href="/static/vocab_learning/vocab_learning.css?v=10">
    <link rel="stylesheet" href="/static/reading/reading.css?v=12">
    <link rel="stylesheet" href="/static/shared/sidebar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    {% include 'shared/sidebar.html' %}
    <div class="app-container reading-container">
        {% include 'shared/passage_picker.html' %}

        <div id="screen-loading" class="screen">
            <div class="loader"></div>
            <p>{{ t('reading.loading_passage') }}</p>
        </div>

        <div id="screen-reading" class="screen">
            <div class="toolbar">
                <div class="toolbar-right">
                    <button class="btn" id="auto-play-btn" onclick="toggleAutoPlay()">
                        <i class="fa-solid fa-play" aria-hidden="true"></i>
                        <span>{{ t('reading.auto_play') }}</span>
                    </button>
                    <button class="btn" id="toggle-pinyin-btn" onclick="togglePinyin()">{{ t('reading.show_pinyin') }}</button>
                    <button class="btn" id="toggle-meaning-btn" onclick="toggleMeaning()">{{ t('reading.show_meaning') }}</button>
                    <button class="btn" id="show-vocab-btn" onclick="openVocabPanel()">
                        <i class="fa-solid fa-table-list" aria-hidden="true"></i>
                        <span>{{ t('reading.vocab_btn') }}</span>
                    </button>
                </div>
            </div>

            <div id="reading-breadcrumb"></div>
            <div id="reading-content" class="reading-content"><!-- Content injected via JS --></div>

            <div class="finish-bar">
                <button class="btn primary" onclick="startLessonPractice()">{{ t('reading.flash_cards') }}</button>
            </div>
        </div>

        <div id="screen-lesson-summary" class="screen">
            <div class="vl-summary-topbar lesson-summary-topbar">
                <div>
                    <div id="lesson-learner-breadcrumb"></div>
                </div>
            </div>

            <div class="vocab-content-card lesson-summary-content-card">
                <div class="lesson-summary-toolbar">
                    <button class="btn" id="lesson-summary-auto-play-btn" onclick="toggleLessonSummaryAutoPlay()">
                        <i class="fa-solid fa-play" aria-hidden="true"></i>
                        <span>{{ t('reading.auto_play') }}</span>
                    </button>
                    <button class="btn" id="lesson-toggle-pinyin-btn" onclick="toggleLessonSummaryPinyin()">{{ t('reading.show_pinyin') }}</button>
                    <button class="btn" id="lesson-toggle-meaning-btn" onclick="toggleLessonSummaryMeaning()">{{ t('reading.show_meaning') }}</button>
                </div>

                <div id="lesson-learner-preview" class="lesson-learner-preview"></div>
            </div>

            <div class="vl-summary-footer lesson-summary-actions">
                <button class="vl-train-btn vl-learn-btn" onclick="startLessonCards()">
                    <i class="fa-solid fa-graduation-cap" aria-hidden="true"></i>
                    <span>{{ t('reading.learn_this_lesson') }}</span>
                </button>
                <button class="vl-train-btn" onclick="goToLessonTrainer()">
                    <i class="fa-solid fa-dumbbell" aria-hidden="true"></i>
                    <span>{{ t('reading.train_this_lesson') }}</span>
                </button>
            </div>
        </div>

        <div id="screen-lesson-card" class="screen">
            <div class="toolbar lesson-card-toolbar">
                <button class="btn secondary" onclick="showLessonSummary()">&larr; {{ t('reading.summary') }}</button>
                <span id="lesson-card-counter" class="vl-counter"></span>
            </div>
            <div class="vl-progress-bar lesson-card-progress">
                <div id="lesson-card-progress-fill" class="vl-progress-fill" style="width:0%"></div>
            </div>

            <div class="vl-card lesson-line-card">
                <div id="lesson-card-hanzi" class="vl-hanzi lesson-line-hanzi"></div>
                <div id="lesson-card-pinyin" class="vl-pinyin"></div>
                <div id="lesson-card-meaning" class="vl-meaning"></div>

                <div class="vl-typing-container">
                    <input type="text" id="lesson-card-typing-input" lang="zh-CN"
                        placeholder="{{ t('lesson.typing_placeholder') }}" autocomplete="off" class="vl-input">
                </div>

                <div class="lesson-card-controls">
                    <button id="lesson-card-audio-btn" class="vl-audio-btn" onclick="playLessonCardAudio()">
                        <i class="fa-solid fa-volume-high" aria-hidden="true"></i>
                        <span>{{ t('reading.play_audio') }}</span>
                    </button>
                    <button id="lesson-card-speak-btn" class="vl-speak-btn" onclick="toggleLessonSpeakingPractice()">
                        <i class="fa-solid fa-microphone" aria-hidden="true"></i>
                        <span>{{ t('vocab_trainer.speak') }}</span>
                    </button>
                </div>

                <div id="lesson-speaking-panel" class="vl-speaking-panel" style="display:none;">
                    <div id="lesson-speaking-status" class="vl-speaking-status">
                        {{ t('reading.speaking_status') }}
                    </div>
                    <div id="lesson-speaking-result" class="vl-speaking-result" style="display:none;"></div>
                </div>
                <audio id="lesson-card-audio"></audio>
            </div>

            <div class="vl-nav-row lesson-card-nav">
                <button id="lesson-card-prev" class="vl-nav-btn" onclick="prevLessonCard()">{{ t('reading.prev') }}</button>
                <button class="vl-train-btn" onclick="showLessonSummary()">{{ t('reading.summary') }}</button>
                <button id="lesson-card-next" class="vl-nav-btn" onclick="nextLessonCard()">{{ t('reading.next') }}</button>
            </div>
        </div>
    </div>
    </div><!-- /.page-main -->
    </div><!-- /.page-layout -->

    <div id="vocab-panel-overlay" class="vocab-panel-overlay" onclick="closeVocabIfBackground(event)">
        <div class="vocab-panel vocab-table-theme" role="dialog" aria-modal="true" aria-label="{{ t('widgets.vocab_panel_aria') }}">
            <button class="vocab-close-btn vocab-panel-floating-close" onclick="closeVocabPanel()"
                aria-label="{{ t('widgets.close_vocab_aria') }}">
                <i class="fa-solid fa-xmark" aria-hidden="true"></i>
            </button>
            <div class="vocab-panel-body">
                <div id="vocab-panel-body" class="vocab-table-wrap">
                    <div class="vocab-loading">{{ t('widgets.loading') }}</div>
                </div>
            </div>
        </div>
    </div>

    <div id="word-popup-overlay" class="word-popup-overlay" onclick="closeWordPopup()">
        <div class="word-popup" onclick="event.stopPropagation()">
            <button class="word-popup-close" onclick="closeWordPopup()" aria-label="{{ t('widgets.close') }}">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="word-popup-hanzi" class="word-popup-hanzi"></div>
            <div id="word-popup-pinyin" class="word-popup-pinyin"></div>
            <div id="word-popup-meaning-vn" class="word-popup-meaning"></div>
            <div id="word-popup-meaning-en" class="word-popup-meaning word-popup-meaning-en"></div>
            <div class="word-popup-actions">
                <button id="word-popup-audio-btn" class="word-popup-btn" onclick="playWordPopupAudio()">
                    <i class="fa-solid fa-volume-high"></i>
                    <span>{{ t('widgets.listen') }}</span>
                </button>
                <button id="word-popup-stroke-btn" class="word-popup-btn" onclick="toggleWordStroke()">
                    <i class="fa-solid fa-pen-nib"></i>
                    <span>{{ t('widgets.stroke') }}</span>
                </button>
            </div>
            <div id="word-popup-stroke-area" class="word-popup-stroke-area" style="display:none;">
                <div id="word-stroke-tabs" class="stroke-char-tabs"></div>
                <div id="word-stroke-canvas" class="stroke-canvas-wrap">
                    <div id="word-stroke-container"></div>
                </div>
                <div class="stroke-controls">
                    <button class="stroke-btn" onclick="wordStrokeAnimate()">
                        <i class="fa-solid fa-play"></i> {{ t('widgets.animate') }}
                    </button>
                    <button class="stroke-btn" onclick="wordStrokeQuiz()">
                        <i class="fa-solid fa-pen"></i> {{ t('widgets.practice') }}
                    </button>
                    <button class="stroke-btn secondary" onclick="wordStrokeReset()">
                        <i class="fa-solid fa-rotate-left"></i> {{ t('widgets.reset') }}
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <script src="/static/shared/passage_picker.js?v=11"></script>
    <script src="/static/shared/passage_label.js"></script>
    <script src="/static/shared/han_text.js?v=2"></script>
    <script src="/static/reading/reading.js?v=29"></script>
    <script src="/static/shared/sidebar.js?v=7"></script>
</body>

</html>
