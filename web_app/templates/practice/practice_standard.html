<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('practice.page_title', number=number) }}</title>
    <script>
        window.practiceNumber = {{ number if number is defined else 'null' }};
        window.lessonId = "{{ lesson_id if lesson_id is defined else '' }}";
        window.progressFilter = "{{ progress_filter if progress_filter is defined else '' }}";
        window.practiceCategory = "{{ category if category is defined else 'practice' }}";
        window.multiMode = {{ 'true' if multi_mode else 'false' }};
    </script>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/practice/practice.css?v=12">
    <link rel="stylesheet" href="/static/practice/practice_standard.css?v=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="with-site-nav practice-page">
    {% include 'shared/site_nav.html' %}
    <div class="practice-shell ps-shell" id="practice-shell">

        <!-- LOADING -->
        <div class="p-screen active" id="screen-loading">
            <div class="loading-spinner"></div>
            <p style="color:var(--text-muted); margin-top:16px;">{{ t('practice.loading') }}</p>
        </div>

        <!-- MAIN PRACTICE -->
        <div class="p-screen" id="screen-practice">
            <!-- Top Bar -->
            <div class="p-topbar">
                <a href="/practice" class="p-back-btn">←</a>
                <div class="p-progress-wrap">
                    <div class="p-progress-bar">
                        <div class="p-progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="p-counter" id="group-counter">1 / 1</span>
                </div>
                <div class="p-score-badge" id="score-badge">
                    <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                    <span id="score-val">0</span>
                </div>
            </div>

            <div class="ps-body">
                <!-- Question Sidebar -->
                <aside class="ps-sidebar">
                    <div class="ps-sidebar-title">{{ t('practice.all_questions') }}</div>
                    <div class="ps-sidebar-list" id="ps-sidebar-list"></div>
                </aside>

                <div class="ps-main">
                    <!-- Skill Tag -->
                    <div class="p-skill-tag" id="skill-tag">{{ t('recommend.listening') }}</div>

                    <!-- Question Card Area -->
                    <div class="p-card" id="question-card">
                        <!-- Dynamically rendered -->
                    </div>

                    <!-- Bottom Nav -->
                    <div class="p-nav">
                        <button class="p-btn p-btn-check" id="btn-check" onclick="checkAnswers()" disabled>
                            {{ t('practice.check') }}
                        </button>
                        <button class="p-btn p-btn-finish" id="btn-finish" onclick="finishPractice()" style="display:none">
                            {{ t('practice.finish') }}
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- RESULT -->
        <div class="p-screen" id="screen-result">
            <div class="result-container">
                <div class="result-emoji" id="result-emoji">
                    <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
                </div>
                <h1 class="result-title">{{ t('practice.complete_title') }}</h1>
                <p class="result-sub">{{ t('practice.set_label') }} <span id="result-number"></span></p>
                <div class="result-score-box">
                    <div class="result-score-num" id="result-score">0 / 0</div>
                    <div class="result-score-label">{{ t('practice.correct_answers') }}</div>
                </div>
                <div class="result-actions">
                    <a href="/practice" id="result-back-btn" class="p-btn p-btn-check" style="text-decoration:none; text-align:center;">
                        ← {{ t('practice.back_to_practice') }}
                    </a>
                    <button class="p-btn p-btn-next" onclick="location.reload()">
                        {{ t('practice.retry') }}
                    </button>
                </div>
            </div>
        </div>

    </div>

    <audio id="audio-player" preload="auto"></audio>
    <script src="/static/shared/han_text.js?v=4"></script>
    <script src="/static/practice/practice_engine.js?v=1"></script>
    <script src="/static/practice/practice_standard.js?v=1"></script>
</body>
</html>
