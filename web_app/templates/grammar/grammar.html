<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grammar</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/shared/passage_picker.css?v=999">
    <link rel="stylesheet" href="/static/grammar/grammar.css?v=999">
    <link rel="stylesheet" href="/static/shared/sidebar.css?v=5">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    {% include 'shared/sidebar.html' %}
        <div class="app-container grammar-container">
            {% include 'shared/passage_picker.html' %}

            <section id="screen-loading" class="screen">
                <div class="loader"></div>
                <p>Loading grammar...</p>
            </section>

            <section id="screen-grammar" class="screen">
                <div class="grammar-topbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div id="grammar-breadcrumb" style="margin-bottom: 0;"></div>
                    <button class="btn primary grammar-finish-btn" onclick="goBackToPartSelection()" style="padding: 8px 16px; min-height: auto; flex-direction: row;">
                        Finish
                    </button>
                </div>
                <div id="grammar-body" class="grammar-body"></div>
            </section>
        </div>
    </div><!-- /.page-main -->
</div><!-- /.page-layout -->

    <script src="/static/shared/passage_picker.js?v=11"></script>
    <script src="/static/shared/passage_label.js"></script>
    <script src="/static/grammar/grammar.js?v=999"></script>
    <script src="/static/shared/sidebar.js?v=7"></script>
</body>
</html>
