<!DOCTYPE html>
<html lang="{{ current_lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ t('review.page_title') }}</title>
    <link rel="stylesheet" href="/static/shared/styles.css?v=7">
    <link rel="stylesheet" href="/static/review/review.css?v=3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="with-site-nav">
    {% include 'shared/site_nav.html' %}
    <div class="review-container">
        <a href="/" class="page-back">← {{ t('picker.back_to_dashboard') }}</a>

        <div class="page-header">
            <h1 class="page-title">
                <i class="fa-solid fa-clock-rotate-left" aria-hidden="true"></i>
                <span>{{ t('review.page_title') }}</span>
            </h1>
            <p class="page-subtitle">{{ t('review.subtitle') }}</p>
        </div>

        <!-- Session list -->
        <div id="session-list-view">
            <div class="review-filters">
                <div class="filter-group">
                    <label class="filter-label" for="filter-date">{{ t('review.date') }}</label>
                    <div class="review-date-wrap">
                        <input type="date" id="filter-date" class="filter-select">
                        <button type="button" id="filter-date-clear" class="review-date-clear">{{ t('review.all_dates') }}</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label" for="filter-level">{{ t('recommend.level') }}</label>
                    <select id="filter-level" class="filter-select">
                        <option value="all">{{ t('recommend.all_levels') }}</option>
                        <option value="1">HSK 1</option>
                        <option value="2">HSK 2</option>
                        <option value="3">HSK 3</option>
                        <option value="4">HSK 4</option>
                        <option value="5">HSK 5</option>
                        <option value="6">HSK 6</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label" for="filter-category">{{ t('recommend.category') }}</label>
                    <select id="filter-category" class="filter-select">
                        <option value="all">{{ t('recommend.all_categories') }}</option>
                        <option value="practice">{{ t('dashboard.exercise') }}</option>
                        <option value="exam">{{ t('dashboard.exam') }}</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label" for="filter-sort">{{ t('review.sort') }}</label>
                    <select id="filter-sort" class="filter-select">
                        <option value="recent">{{ t('review.sort_recent') }}</option>
                        <option value="oldest">{{ t('review.sort_oldest') }}</option>
                    </select>
                </div>
            </div>

            <div id="session-list">
                <div class="state-box">
                    <div class="loading-dots"><span></span><span></span><span></span></div>
                    <div class="state-title" style="margin-top:16px;">{{ t('review.loading') }}</div>
                </div>
            </div>

            <div id="review-pagination" class="review-pagination hidden">
                <button type="button" id="page-prev" class="review-page-btn" onclick="changePage(-1)">
                    <i class="fa-solid fa-chevron-left" aria-hidden="true"></i> {{ t('reading.prev') }}
                </button>
                <span id="page-indicator" class="review-page-indicator"></span>
                <button type="button" id="page-next" class="review-page-btn" onclick="changePage(1)">
                    {{ t('reading.next') }} <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
                </button>
            </div>
        </div>

        <!-- Session detail (hidden until a session is opened) -->
        <div id="session-detail-view" class="hidden">
            <button type="button" class="review-back-btn" onclick="showSessionList()">
                {{ t('review.back_to_list') }}
            </button>
            <div id="session-detail"></div>
        </div>
    </div>

    <script src="/static/review/review.js?v=3"></script>
</body>
</html>
